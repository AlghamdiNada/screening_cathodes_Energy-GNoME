continue: True
calculation: vc-relax
system: ./MgV2O4_supercell.cif
input_dft: 'XC-000I-000I-000I-000I-497L-498L'
ecutwfc: 90
ecutrho: 360
etot_conv_thr: 0.0001
forc_conv_thr: 0.001
pseudopotentials:
  Mg: Mg_ONCV_PBE-1.2.upf
  O: O_ONCV_PBE-1.2.upf
  V: V_ONCV_PBE-1.2.upf
command: srun --cpu-bind=cores /leonardo/pub/userexternal/nalghamd/programs/q-e/bin/pw.x -in pwscf.in
pseudo_dir: PP-r2scan
electron_maxstep: 1000
kpts: [1, 3, 1]
koffset: [0, 0, 0]
optimizer:
  type: FIRE2
  fmax: 0.05
  max steps: 5000
output files:
  thermo: VP/thermo.csv
  trajectory: VP/trj.xyz
  convex hull: VP/hull.csv
  voltage: VP/voltage.csv
states folder: VP/states
working ion:
  charge carried: 2
  chemical potential:
          #          Mg: ./Mg_mp-153_conventional_standard.cif
          Mg: -1481.803
mixing_beta: 0.3
